[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    unit: Unit tests
    integration: Integration tests
    api: API endpoint tests
    slow: Slow running tests
    performance: Performance tests
    security: Security tests
    comprehensive: Comprehensive test suites
    edge_case: Edge case tests
addopts = 
    -v
    --strict-markers
    --tb=short
    --ignore=tests/api/test_bookings_endpoints.py
    --ignore=tests/api/test_masterclass_endpoints.py
    --ignore=tests/test_organizations.py
    --ignore=tests/unit/test_booking_models.py
